spring:
  application:
    name: stocklens-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stocklens}
    username: ${POSTGRES_USER:stocklens}
    password: ${POSTGRES_PASSWORD:stocklens_dev}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

stocklens:
  providers:
    fmp:
      api-key: ${FMP_API_KEY:}
      base-url: ${FMP_BASE_URL:https://financialmodelingprep.com/stable}
      connect-timeout: ${FMP_CONNECT_TIMEOUT:2s}
      read-timeout: ${FMP_READ_TIMEOUT:5s}
      max-attempts: ${FMP_MAX_ATTEMPTS:2}
    yahoo-finance-news:
      base-url: ${YAHOO_FINANCE_BASE_URL:https://finance.yahoo.com}
      connect-timeout: ${YAHOO_FINANCE_CONNECT_TIMEOUT:2s}
      read-timeout: ${YAHOO_FINANCE_READ_TIMEOUT:5s}
      max-attempts: ${YAHOO_FINANCE_MAX_ATTEMPTS:2}
  research:
    ai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:}
      temperature: ${AI_COMPARISON_TEMPERATURE:0.2}
      max-tokens: ${AI_COMPARISON_MAX_TOKENS:1200}
